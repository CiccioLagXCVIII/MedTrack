<!-- login.html (Versione Pulita) -->
<!DOCTYPE html>
<html lang="it">

    <head>
        <!-- AA 1: META TAGS ESSENZIALI -->
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <title>Login | ISFplan</title>

        <!-- AA 2: CONFIGURAZIONE PWA E MOBILE -->
        <!-- BB 2.1: Colore tema e Manifest -->
        <meta name="theme-color" content="#bf4f8a">
        <meta name="mobile-web-app-capable" content="yes">
        <link rel="manifest" href="manifest.json">

        <!-- BB 2.2: Ottimizzazione iOS -->
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
        <link rel="apple-touch-icon" href="icon/siteLogo.png">

        <!-- BB 2.3: Icone Browser -->
        <link rel="icon" type="image/png" href="icon/siteIcon.png">

        <!-- AA 3: STILI E FONT (CSS) -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
            rel="stylesheet">
        <link rel="stylesheet" href="style.css">

        <!-- AA 4: LIBRERIE ESTERNE (JS) -->
        <script src="https://unpkg.com/lucide@latest"></script>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

        <!-- AA 5: LOGICA AUTH E PWA MANAGER -->
        <script src="config.js" defer></script>
        <script src="auth.js" defer></script>
        <script src="pwaManager.js" defer></script>
    </head>

    <body class="login-body">

        <div class="login-container">
            <!-- Card principale con stile Premium -->
            <div class="card login-card-custom border-0 shadow-lg animate-float">
                <div class="card-body p-4 p-md-5">

                    <!-- Header: Logo e Titolo -->
                    <div class="text-center mb-5">
                        <div class="logo-bg-circle mb-3">
                            <img src="icon/siteLogo.png" alt="Logo" class="logo-login img-fluid">
                        </div>
                        <h1 class="h3 fw-800 text-dark mb-1">Bentornato</h1>
                        <p class="text-secondary small fw-medium">Accedi Alla Piattaforma ISFplan</p>
                    </div>

                    <form id="login-form">
                        <!-- Campo Email -->
                        <div class="mb-3">
                            <label class="form-label login-label-sm">Indirizzo Email</label>
                            <div class="input-group login-input-group">
                                <span class="input-group-text border-end-0">
                                    <i data-lucide="mail" class="icon-login"></i>
                                </span>
                                <input type="email" id="login-email" class="form-control border-start-0"
                                    placeholder="nome@esempio.it" required>
                            </div>
                        </div>

                        <!-- Campo Password -->
                        <div class="mb-4">
                            <label class="form-label login-label-sm">Password</label>
                            <div class="input-group login-input-group">
                                <span class="input-group-text border-end-0">
                                    <i data-lucide="lock" class="icon-login"></i>
                                </span>
                                <input type="password" id="login-password"
                                    class="form-control border-start-0 border-end-0" placeholder="••••••••" required>
                                <button type="button" id="toggle-password"
                                    class="btn border-start-0 px-3 bg-white text-secondary">
                                    <i data-lucide="eye" class="icon-login"></i>
                                </button>
                            </div>
                        </div>

                        <!-- Messaggio Errore -->
                        <div id="login-error"
                            class="alert alert-danger display-none py-2 px-3 text-center small fw-semibold mb-3 rounded-3">
                        </div>

                        <!-- Bottone Login (Stesso stile del Calendario) -->
                        <button type="submit" id="login-btn"
                            class="btn btn-login-submit w-100 py-3 rounded-3 fw-bold shadow-sm">
                            <span class="btn-text">Entra In ISFplan</span>
                            <div class="spinner-border spinner-border-sm text-light display-none mx-auto"
                                id="login-spinner" role="status"></div>
                        </button>
                    </form>

                    <!-- Footer -->
                    <div class="text-center mt-5">
                        <p class="text-muted extra-small mb-0">&copy; ISFplan - Tracking System Per ISF</p>
                    </div>
                </div>
            </div>
        </div>
    </body>

</html>
