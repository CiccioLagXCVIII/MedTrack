<!-- AA Modifica Medico -->
<div class="modal fade" id="modal-edit-client" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header border-0 pb-0">
                <h4 class="modal-title fw-bold d-flex align-items-center gap-2"><i data-lucide="user-cog"
                        class="text-primary"></i> Modifica Medico</h4>
                <button type="button" class="btn-close" onclick="closeModal('modal-edit-client')"></button>
            </div>
            <div class="modal-body p-4 text-start">
                <div class="mb-3">
                    <label class="label-custom-sm">Nome:</label>
                    <input type="text" id="modal-edit-name" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="label-custom-sm">Città:</label>
                    <input type="text" id="modal-edit-city" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="label-custom-sm">Cellulare:</label>
                    <input type="tel" id="modal-edit-phone" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="label-custom-sm">Specializzazione:</label>
                    <select id="modal-edit-spec" class="form-select"></select>
                </div>
                <div class="mb-4">
                    <label class="label-custom-sm">Giorni Ricevimento:</label>
                    <div class="d-flex flex-wrap gap-2" id="modal-edit-days-checkboxes">
                        <input type="checkbox" class="btn-check" id="edit-day-1" value="1">
                        <label class="btn btn-outline-primary btn-sm flex-fill fw-bold" for="edit-day-1">Lun</label>

                        <input type="checkbox" class="btn-check" id="edit-day-2" value="2">
                        <label class="btn btn-outline-primary btn-sm flex-fill fw-bold" for="edit-day-2">Mar</label>

                        <input type="checkbox" class="btn-check" id="edit-day-3" value="3">
                        <label class="btn btn-outline-primary btn-sm flex-fill fw-bold" for="edit-day-3">Mer</label>

                        <input type="checkbox" class="btn-check" id="edit-day-4" value="4">
                        <label class="btn btn-outline-primary btn-sm flex-fill fw-bold" for="edit-day-4">Gio</label>

                        <input type="checkbox" class="btn-check" id="edit-day-5" value="5">
                        <label class="btn btn-outline-primary btn-sm flex-fill fw-bold" for="edit-day-5">Ven</label>
                    </div>
                </div>
                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-light rounded-pill flex-fill fw-semibold"
                        onclick="closeModal('modal-edit-client')">Annulla</button>
                    <button type="button" onclick="confirmEditClient()"
                        class="btn btn-primary rounded-pill flex-fill fw-bold shadow-sm">Salva</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- AA Creazione E Modifica Task -->
<div class="modal fade" id="modal-add-task" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold d-flex align-items-center gap-2" id="task-modal-title">
                    <i data-lucide="check-square" class="text-primary"></i> Nuova Attività
                </h5>
                <button type="button" class="btn-close" onclick="closeModal('modal-add-task')"></button>
            </div>
            <div class="modal-body p-4">
                <input type="hidden" id="task-id-hidden">

                <!-- Selettore Tipo Task -->
                <div class="segmented-control theme-indigo mb-4" id="task-type-selector">
                    <input type="radio" name="taskType" id="type-call" value="call" onchange="toggleTaskType()"
                        class="d-none">
                    <label class="segmented-btn" for="type-call"><i data-lucide="phone" class="icon-sm"></i>
                        Chiamata</label>

                    <input type="radio" name="taskType" id="type-appt" value="appt" onchange="toggleTaskType()"
                        class="d-none">
                    <label class="segmented-btn" for="type-appt"><i data-lucide="calendar" class="icon-sm"></i>
                        Appuntamento</label>

                    <input type="radio" name="taskType" id="type-gen" value="gen" checked onchange="toggleTaskType()"
                        class="d-none">
                    <label class="segmented-btn" for="type-gen"><i data-lucide="align-left" class="icon-sm"></i>
                        Generica</label>
                </div>

                <div id="task-group-generic" class="mb-3">
                    <label class="label-custom-sm">Titolo Attività</label>
                    <input type="text" id="task-titolo" class="form-control mb-3"
                        placeholder="Esempio: Inviare report...">

                    <label class="label-custom-sm">Note (Opzionale)</label>
                    <textarea id="task-note" class="form-control" rows="2"
                        placeholder="Dettagli aggiuntivi..."></textarea>
                </div>

                <div id="task-group-medico" class="mb-3">
                    <label class="label-custom-sm" id="label-medico-task">Collega A Medico</label>
                    <select id="task-medico-link" class="form-select"></select>
                </div>

                <label class="label-custom-sm">Priorità</label>
                <select id="task-priorita" class="form-select">
                    <option value="1">Bassa (Grigio)</option>
                    <option value="2">Media (Giallo)</option>
                    <option value="3">Alta (Rosso)</option>
                </select>
            </div>
            <div class="modal-footer border-0 pt-0">
                <button class="btn btn-light rounded-pill px-4 fw-semibold"
                    onclick="closeModal('modal-add-task')">Annulla</button>
                <button class="btn btn-primary rounded-pill px-4 fw-bold shadow-sm" onclick="saveTask()">Salva
                    Attività</button>
            </div>
        </div>
    </div>
</div>
