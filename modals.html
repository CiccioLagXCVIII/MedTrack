<!-- modals.html (Versione Pulita) -->

<!-- MODALE: ORARIO WALK-IN -->
<div class="modal fade" id="modal-time" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-body p-4 text-center">
                <h3 id="modal-time-title" class="fw-bold mb-2 text-dark">Orario</h3>
                <p id="modal-time-desc" class="text-secondary mb-3 small"></p>
                <!-- Aggiunta classe input-time-lg per lo stile del font grande -->
                <input type="time" id="modal-time-input"
                    class="form-control form-control-lg mb-4 text-center input-time-lg">
                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-light flex-fill fw-semibold"
                        data-bs-dismiss="modal">Annulla</button>
                    <button type="button" onclick="confirmTimeModal()"
                        class="btn btn-success flex-fill fw-bold">Conferma</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- MODALE: CONFERMA ELIMINAZIONE -->
<div class="modal fade" id="modal-confirm" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-body p-4 text-center">
                <!-- Rimosso stile inline dall'icona, aggiunta classe icon-lg -->
                <h3 class="text-danger fw-bold mb-2 d-flex align-items-center justify-content-center gap-2">
                    <i data-lucide="alert-triangle" class="icon-lg"></i> Conferma Azione
                </h3>
                <p id="modal-confirm-desc" class="text-secondary mb-4"></p>
                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-light flex-fill fw-semibold"
                        data-bs-dismiss="modal">Annulla</button>
                    <button type="button" id="btn-execute-confirm"
                        class="btn btn-danger flex-fill fw-bold">Elimina</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- MODALE: MODIFICA MEDICO -->
<div class="modal fade" id="modal-edit-client" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header border-0 pb-0">
                <h4 class="modal-title fw-bold">Modifica Medico</h4>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4 text-start">
                <div class="mb-3">
                    <label class="form-label label-custom-sm">Nome:</label>
                    <input type="text" id="modal-edit-name" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label label-custom-sm">Città:</label>
                    <input type="text" id="modal-edit-city" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label label-custom-sm">Cellulare:</label>
                    <input type="tel" id="modal-edit-phone" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label label-custom-sm">Specializzazione:</label>
                    <select id="modal-edit-spec" class="form-select"></select>
                </div>
                <div class="mb-4">
                    <label class="form-label label-custom-sm">Giorni Di Ricevimento (Liberi):</label>
                    <div class="d-flex flex-wrap gap-2" id="modal-edit-days-checkboxes">
                        <input type="checkbox" class="btn-check" id="edit-day-1" value="1">
                        <label class="btn btn-outline-primary btn-sm flex-fill fw-bold" for="edit-day-1">Lun</label>

                        <input type="checkbox" class="btn-check" id="edit-day-2" value="2">
                        <label class="btn btn-outline-primary btn-sm flex-fill fw-bold" for="edit-day-2">Mar</label>

                        <input type="checkbox" class="btn-check" id="edit-day-3" value="3">
                        <label class="btn btn-outline-primary btn-sm flex-fill fw-bold" for="edit-day-3">Mer</label>

                        <input type="checkbox" class="btn-check" id="edit-day-4" value="4">
                        <label class="btn btn-outline-primary btn-sm flex-fill fw-bold" for="edit-day-4">Gio</label>

                        <input type="checkbox" class="btn-check" id="edit-day-5" value="5">
                        <label class="btn btn-outline-primary btn-sm flex-fill fw-bold" for="edit-day-5">Ven</label>
                    </div>
                </div>
                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-light flex-fill fw-semibold"
                        data-bs-dismiss="modal">Annulla</button>
                    <button type="button" onclick="confirmEditClient()"
                        class="btn btn-primary flex-fill fw-bold">Salva</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- MODALE: ALERT ATTENZIONE -->
<div class="modal fade" id="modal-alert" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content border-0 shadow">
            <div class="modal-body p-4 text-center">
                <h3 class="text-warning fw-bold mb-2">Attenzione</h3>
                <p id="modal-alert-desc" class="text-secondary mb-4"></p>
                <button type="button" class="btn btn-primary w-100 fw-bold" data-bs-dismiss="modal">OK</button>
            </div>
        </div>
    </div>
</div>

<!-- MODALE: NOTE -->
<div class="modal fade" id="modal-note" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header border-0 pb-0">
                <h4 class="modal-title fw-bold">Note Visita</h4>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                <textarea id="modal-note-input" rows="4" class="form-control mb-4"
                    placeholder="Scrivi Una Nota..."></textarea>
                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-light flex-fill fw-semibold"
                        data-bs-dismiss="modal">Annulla</button>
                    <button type="button" id="btn-save-note" class="btn btn-success flex-fill fw-bold">Salva
                        Nota</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- MODALE: SPOSTA APPUNTAMENTO -->
<div class="modal fade" id="modal-edit-visit" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header border-0 pb-0">
                <h4 class="modal-title fw-bold">Sposta Appuntamento</h4>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4 text-start">
                <p id="modal-edit-visit-desc" class="text-secondary small mb-3"></p>
                <div class="mb-3">
                    <label class="form-label label-custom-sm">Nuova Data:</label>
                    <input type="date" id="edit-visit-date" class="form-control">
                </div>
                <div class="mb-4">
                    <label class="form-label label-custom-sm">Nuovo Orario:</label>
                    <input type="time" id="edit-visit-time" class="form-control">
                </div>
                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-light flex-fill fw-semibold"
                        data-bs-dismiss="modal">Annulla</button>
                    <button type="button" onclick="confirmEditVisit()"
                        class="btn btn-primary flex-fill fw-bold">Salva</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- MODALE: NUOVA VISITA DA ANAGRAFICA -->
<div class="modal fade" id="modal-add-visit" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header border-0 pb-0">
                <h4 class="modal-title fw-bold">Aggiungi Appuntamento</h4>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4 text-start">
                <p id="modal-add-visit-desc" class="text-secondary small mb-3"></p>
                <div class="mb-3">
                    <label class="form-label label-custom-sm">Data Visita:</label>
                    <input type="date" id="new-visit-date" class="form-control">
                </div>
                <div class="mb-4">
                    <label class="form-label label-custom-sm">Orario:</label>
                    <input type="time" id="new-visit-time" value="09:00" class="form-control">
                </div>
                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-light flex-fill fw-semibold"
                        data-bs-dismiss="modal">Annulla</button>
                    <button type="button" onclick="confirmNewVisitFromAnagrafica()"
                        class="btn btn-success flex-fill fw-bold">Conferma</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- MODALE: SCELTA NAVIGATORE -->
<div class="modal fade" id="modal-nav" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-body p-4 text-center">
                <h5 class="fw-bold mb-4">Scegli Navigatore</h5>
                <div class="d-flex flex-column gap-3">
                    <a id="btn-nav-google" href="#" target="_blank"
                        class="btn btn-outline-primary py-3 rounded-3 fw-bold d-flex align-items-center justify-content-center gap-2">
                        <i data-lucide="map"></i> Google Maps
                    </a>
                    <a id="btn-nav-waze" href="#" target="_blank"
                        class="btn btn-outline-warning py-3 rounded-3 fw-bold d-flex align-items-center justify-content-center gap-2 text-dark">
                        <i data-lucide="navigation"></i> Waze
                    </a>
                    <button type="button" class="btn btn-light py-2 mt-2 fw-semibold text-secondary"
                        data-bs-dismiss="modal">Annulla</button>
                </div>
            </div>
        </div>
    </div>
</div>
