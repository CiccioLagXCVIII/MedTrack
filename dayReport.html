<!DOCTYPE html>
<html lang="it">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Report Giornaliero | MedTrack</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="styleProFeatures.css">
        <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/dayjs@1/locale/it.js"></script>
        <script src="https://unpkg.com/lucide@latest"></script>
        <script src="offlineManager.js"></script>
        <script src="dayReportManager.js"></script>
    </head>

    <body class="report-body">
        <!-- Overlay di sfondo per coerenza col brand -->
        <div class="report-bg-gradient"></div>

        <div class="container report-container">
            <div class="container report-container">
                <!-- HEADER: Titolo con tocco di colore -->
                <header class="report-header d-flex align-items-center justify-content-between mb-4">
                    <div class="d-flex align-items-center gap-3">
                        <a href="index.html" class="btn-back-circle shadow-sm">
                            <i data-lucide="chevron-left"></i>
                        </a>
                        <div>
                            <h1 class="report-title text-gradient">Briefing</h1>
                            <p class="report-subtitle" id="report-date">...</p>
                        </div>
                    </div>
                    <div class="report-badge-today pulse-animation">LIVE</div>
                </header>

                <!-- DASHBOARD: Statistiche con bordo colorato -->
                <section class="report-stats-card mb-4">
                    <div class="card border-0 shadow-sm rounded-4 overflow-hidden accent-line">
                        <div class="card-body p-4 d-flex align-items-center justify-content-between">
                            <div>
                                <span class="stats-label">VISITE DI OGGI</span>
                                <h2 class="stats-value" id="total-visits">0</h2>
                            </div>
                            <div class="stats-icon-bg">
                                <i data-lucide="calendar-check"></i>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- LISTA VISITE -->
                <section class="report-list-section">
                    <h3 class="section-divider-title">Il Tuo Percorso</h3>
                    <!-- Questo contenitore ora è vuoto, il JS lo riempirà correttamente -->
                    <div id="report-list" class="report-timeline"></div>
                </section>

                <footer class="text-center mt-5 mb-5 opacity-50">
                    <img src="icon/siteLogo.png" alt="Logo" style="width: 30px; filter: grayscale(1);">
                </footer>
            </div>

            <!-- Script Lucide già presente nel tuo progetto -->
            <script>lucide.createIcons();</script>
    </body>

</html>
